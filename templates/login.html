{% extends "base.html" %}
{% block title %}Sign in - Mainframe by Netwatch{% endblock %}
{% block body %}
<div class="auth-screen">
    <div class="auth-shell">
        <div class="brand" style="margin-bottom:10px"><span class="dot"></span><b>Mainframe</b></div>
        <form class="card" method="post" action="{{ url_for('auth.login') }}">
            <h1>Sign in</h1>
            <p class="sub">Log into Mainframe - IoT Devices Management Platform</p>

            <label for="u">Username</label>
            <input id="u" name="username" autocomplete="username" autofocus>

            <label for="p">Password</label>
            <div class="field-wrap">
                <input id="p" name="password" type="password" autocomplete="current-password">
            </div>

            <button type="submit">Sign in</button>
            {% if error %}
            <div class="err">{{ error }}</div>
            {% endif %}
            <p class="alt">No account? <a href="{{ url_for('auth.signup') }}">Create one</a></p>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/password_toggle.js') }}"></script>
{% endblock %}
